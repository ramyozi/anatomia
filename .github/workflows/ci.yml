name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v5
        with:
          # Node 22: the build toolchain references the node:sqlite
          # builtin (Node >= 22.5). Must match frontend/Dockerfile.
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: TypeScript
        run: pnpm typecheck

      - name: Production build
        run: pnpm build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7
          if-no-files-found: error

  backend:
    name: Backend (import + smoke tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install runtime + dev deps
        run: |
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Import smoke test
        env:
          DATABASE_URL: sqlite:///./ci.db
          SECRET_KEY: ci-secret
        run: python -c "from app.main import app; print(app.title)"

      - name: Pytest (if any)
        env:
          DATABASE_URL: sqlite:///./ci.db
          SECRET_KEY: ci-secret
        run: |
          if [ -d tests ]; then
            pytest -q --maxfail=1
          else
            echo "no tests/ directory, skipping"
          fi

  docker:
    name: Docker images build + push
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      # Authenticate to the GitHub Container Registry. On pull requests
      # from forks GITHUB_TOKEN is read-only, so we only log in (and
      # later push) for push events on the repo itself.
      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        run: |
          echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          # Push only on a real push to the repo, never on PRs / forks.
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "push=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build + push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: ${{ steps.meta.outputs.push }}
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/anatomia-backend:latest
            ghcr.io/${{ steps.meta.outputs.owner }}/anatomia-backend:${{ steps.meta.outputs.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build + push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: ${{ steps.meta.outputs.push }}
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/anatomia-frontend:latest
            ghcr.io/${{ steps.meta.outputs.owner }}/anatomia-frontend:${{ steps.meta.outputs.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
