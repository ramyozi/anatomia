# Host-side nginx site for Anatomia.
#
# This file lives under /etc/nginx/sites-available/anatomia on the VPS
# and is enabled with a symlink in /etc/nginx/sites-enabled/. Certbot
# rewrites the ``ssl_certificate`` / ``ssl_certificate_key`` lines once
# the HTTPS challenge succeeds.
#
# Pattern:
#   - The Docker compose stack publishes the frontend on
#     127.0.0.1:8080 (see docker-compose.prod.yml). Host nginx
#     terminates TLS and reverse-proxies everything to that port.
#   - HTTP (80) only serves the ACME challenge + a redirect to HTTPS.

upstream anatomia_frontend {
    server 127.0.0.1:8080;
    keepalive 16;
}

# Plain-HTTP server — used for Let's Encrypt and as a redirector.
server {
    listen 80;
    listen [::]:80;
    server_name anatomia.example.com;

    # Let certbot answer the ACME challenge in-place.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    # Everything else hops to HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

# TLS-terminating server — proxies to the dockerized frontend.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name anatomia.example.com;

    # Filled in by certbot after the first issuance.
    # ssl_certificate     /etc/letsencrypt/live/anatomia.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/anatomia.example.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Reasonable production limits.
    client_max_body_size 4M;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;

    # Strong defaults — the frontend container also sets these, the
    # host-level ones cover any direct hit.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    access_log /var/log/nginx/anatomia.access.log;
    error_log  /var/log/nginx/anatomia.error.log warn;

    location / {
        proxy_pass         http://anatomia_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }
}
