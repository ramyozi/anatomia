<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta
      name="description"
      content="Anatomia, exploration interactive du corps humain, des maladies et de la santé mondiale."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <title>Anatomia, explorer le corps humain</title>
    <script>
      /* Anti-FOUC: resolve and apply the theme BEFORE first paint so the
         page never flashes the wrong palette. Mirrors the logic in
         src/stores/theme.ts (storage key + zustand-persist shape). */
      (function () {
        try {
          var raw = localStorage.getItem('anatomia.theme')
          var pref = raw ? JSON.parse(raw).state.preference : 'system'
          var theme = pref
          if (pref === 'system' || !pref) {
            theme = window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light'
          }
          var root = document.documentElement
          root.dataset.theme = theme
          root.style.colorScheme = theme === 'light' ? 'light' : 'dark'
        } catch (e) {
          document.documentElement.dataset.theme = 'dark'
        }
      })()
    </script>
  </head>
  <body class="bg-bg text-ink antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
