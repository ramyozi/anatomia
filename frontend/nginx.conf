# Production nginx config for the Anatomia frontend container.
# - Serves the Vite SPA from /usr/share/nginx/html.
# - Reverse-proxies /api/* to the backend FastAPI container.
# - Sets sane security headers and aggressive caching for hashed assets.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Sensible client limits
    client_max_body_size 4M;
    client_body_timeout 30s;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # gzip — covers our biggest payloads (JS chunks + GLB models)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/json
        application/xml
        application/wasm
        image/svg+xml
        model/gltf-binary
        model/gltf+json;

    # Security headers — kept loose enough for R3F shaders and inline CSS-in-JS.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # /api/* → backend container (resolved via the compose network).
    location /api/ {
        proxy_pass         http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Hashed Vite chunks live under /assets and are safe to cache forever.
    location ^~ /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Stream the GLB anatomy models with strong caching — they're
    # content-addressed via filename and never mutate between builds.
    location ~* \.(glb|gltf|bin|hdr)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # Other static assets get a reasonable cache window.
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff2?|ico)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # SPA fallback — never cache the entry HTML.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, must-revalidate";
    }
}
