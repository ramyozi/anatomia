# Fly.io deployment manifest for the Anatomia backend.
#
# Single-region, single-machine with a 1 GB volume mounted at /data
# holding the SQLite database. Auto-scales to 0 when idle and wakes
# on the first /api/* request — free tier friendly.
#
# Bring up:
#   flyctl launch --copy-config --no-deploy
#   flyctl volume create anatomia_data --region cdg --size 1
#   flyctl deploy

app = "anatomia-api"
primary_region = "cdg"          # Paris — close to ramzibenmansour.fr users

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "production"
  APP_HOST = "0.0.0.0"
  APP_PORT = "8000"
  DATABASE_URL = "sqlite:////data/anatomia.db"

[[mounts]]
  source = "anatomia_data"
  destination = "/data"
  initial_size = "1gb"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 80
    hard_limit = 100

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
