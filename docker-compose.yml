# Local-dev compose. Same image build path as production but:
# - both services expose their port on the host (5173 + 8000)
# - DB is a bind-mounted SQLite file (no Postgres in dev)
# - CORS allows the Vite dev server
#
# For production use docker-compose.prod.yml instead.

name: anatomia-dev

services:
  backend:
    container_name: anatomia-dev-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: development
      DATABASE_URL: sqlite:////data/anatomia.db
      CORS_ORIGINS: http://localhost:5173,http://localhost:5180,http://127.0.0.1:5173,http://127.0.0.1:5180
      SECRET_KEY: dev-secret
    volumes:
      - ./data:/data
    ports:
      - "8000:8000"

  frontend:
    container_name: anatomia-dev-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"
