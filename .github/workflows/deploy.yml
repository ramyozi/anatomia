name: Deploy to VPS

# Triggered manually OR on every push to main when CI is green.
# Requires the following repository secrets:
#   DEPLOY_HOST       — VPS hostname or IP
#   DEPLOY_USER       — SSH user (must own /srv/anatomia)
#   DEPLOY_SSH_KEY    — private key (no passphrase)
#   DEPLOY_DOMAIN     — public domain used for healthcheck
#   DEPLOY_TARGET     — install dir (default: /srv/anatomia)

on:
  workflow_dispatch:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  rollout:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Trigger update.sh on the VPS
        run: |
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "cd ${{ secrets.DEPLOY_TARGET || '/srv/anatomia' }} && \
             ./deploy/scripts/update.sh ${{ secrets.DEPLOY_DOMAIN }}"
